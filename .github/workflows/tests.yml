name: CI - FastAPI Async 

on:
  push:
    branches: ["main"]
  
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine

        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
        
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Instalar Poetry
        run: pip install poetry
      
      - name: Configurar Poetry para não criar venv
        run: poetry config virtualenvs.create false
      
      - name: Instalar dependências
        run: poetry install --no-interaction --no-root
      
      - name: Definir variáveis de ambiente para testes
        run: |
          echo "TESTING=1" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql+asyncpg://test_user:test_password@localhost:5432/test" >> $GITHUB_ENV
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV

      - name: Executar testes
        run: pytest --cov=fast_zero_async --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4

        with:
          token: ${{ secrets.CODECOV_TOKEN }}